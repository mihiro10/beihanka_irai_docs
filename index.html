<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>米飯課への製造依頼 - システムドキュメント</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Chikuya Manufacturing Request System Integrations">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Vue.js Theme for a very clean, professional look -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "BIZ UDPGothic", Meiryo, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app">読み込み中...</div>
  <script>
    window.$docsify = {
      name: '🍚 米飯課への製造依頼',
      repo: '',
      homepage: 'user_guides/01_user_manual.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#2b90d9',
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>
  <!-- Mermaid core MUST load before Docsify -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
  <!-- Docsify v4 Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    // Re-render mermaid after each page load
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.afterEach(function(html) { return html; });
      hook.doneEach(function() { mermaid.run(); });
    });
  </script>
</body>
</html>
